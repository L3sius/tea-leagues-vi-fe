name: Deploy Frontend

on:
  push:
    branches:
      - main  # or master, whatever your branch is

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          password: ${{ secrets.VULTR_PASSWORD }}
          script: |
            cd /root/tea-leagues-vi-fe
            git pull origin main
            docker build \
              --build-arg VITE_API_BASE_URL=https://api.tea-osrs.com \
              -t tea-frontend .
            docker stop tea-frontend || true
            docker rm tea-frontend || true
            docker run -d \
              --name tea-frontend \
              --restart unless-stopped \
              -p 80:80 \
              tea-frontend